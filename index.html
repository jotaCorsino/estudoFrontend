<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Borali | Eventos locais</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <a href="index.html" class="site-logo">Borali</a>

      <nav class="site-nav" aria-label="Menu principal">
        <ul class="site-nav-list">
          <li><a href="#" class="site-nav-link">como funciona</a></li>
          <li><a href="#" class="site-nav-link">eventos</a></li>
          <li><a href="#" class="site-nav-link">sobre</a></li>
          <li><a href="#" class="site-nav-link">contato</a></li>
        </ul>
      </nav>
      <div class="site-header-actions">
        <a href="#" class="site-header-link">Registrar</a>
        <a href="#" class="site-header-button">Login</a>
      </div>
    </header>
    <main>
      <section class="search-section" aria-labelledby="search-title">
        <h1 id="search-title">Encontre eventos perto de você</h1>

        <form class="search-form" action="#" method="get">
          <input
            type="search"
            id="event-search"
            name="search"
            placeholder="Pesquisar eventos..."
          />
          <button type="button" class="location-button">Localização</button>
          <label for="event-date">Selecionar data</label>
          <input type="date" id="event-date" name="date" class="date-input" />
          <br />
          <button type="submit">Pesquisar</button>
        </form>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
